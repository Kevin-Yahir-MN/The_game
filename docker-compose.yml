services:
  nginx:
    image: nginx:1.27-alpine
    container_name: the-game-nginx
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    # We remove host ports (8080:80) so Traefik handles all incoming traffic
    expose:
      - "80"
    volumes:
      - ./nginx-hostinger-ssl.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - the_game_default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.thegame.rule=Host(`kymnavarro.site`)"
      - "traefik.http.routers.thegame.entrypoints=websecure"
      - "traefik.http.routers.thegame.tls=true"
      - "traefik.http.services.thegame.loadbalancer.server.port=80:80"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: the-game-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://thegame:${POSTGRES_PASSWORD}@postgres:5432/thegame
      REDIS_URL: redis://redis:6379
      DB_SSL: "false"
      UPLOADS_DIR: uploads
    volumes:
      - ./storage/uploads:/app/uploads
    networks:
      - the_game_default
    healthcheck:
      test: [ "CMD", "node", "-e", "fetch('http://127.0.0.1:3000/healthz').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  postgres:
    image: postgres:16-alpine
    container_name: the-game-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: thegame
      POSTGRES_USER: thegame
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./storage/postgres:/var/lib/postgresql/data
    networks:
      - the_game_default
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U thegame -d thegame" ]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: the-game-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - ./storage/redis:/data
    networks:
      - the_game_default

networks:
  the_game_default:
    external: true
