<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Partida - The Game</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
        .game-extra-panels {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .info-table,
        .emoji-table {
            width: 100%;
            border-collapse: collapse;
        }

        .info-table td {
            padding: 6px 0;
            vertical-align: middle;
        }

        .emoji-table td {
            width: 50%;
            padding: 6px;
        }

        .emoji-table .emoji-button {
            width: 100%;
            display: inline-flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>

<body>
    <div id="loadingScreen" class="loading-screen">
        <div class="loading-content">
            <div class="loading-spinner"></div>
            <h2>Iniciando Partida</h2>
            <p>Por favor espera...</p>
        </div>
    </div>

    <!-- Contenedor principal del juego -->
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="700"></canvas>
        <div class="game-controls">
            <button id="endTurnBtn">Terminar Turno</button>
        </div>
    </div>

    <div class="game-extra-panels">
        <!-- Tabla de información del jugador/juego -->
        <div class="game-panel info-panel">
            <h3>Información del Juego</h3>
            <div class="panel-content">
                <table class="info-table" aria-label="Información del juego">
                    <tbody>
                        <tr>
                            <td><strong>Turno actual:</strong></td>
                            <td>
                                <span id="currentTurn">Esperando...</span>
                            </td>
                        </tr>
                        <tr>
                            <td><strong>Cartas restantes:</strong></td>
                            <td><span id="remainingDeck">98</span></td>
                        </tr>
                    </tbody>
                </table>

                <!-- El estado de conexión se insertará aquí automáticamente -->
                <div class="progress-container">
                    <span id="progressText">0/2 carta(s) jugada(s)</span>
                    <div class="progress-bar" id="progressBar"></div>
                </div>
            </div>
        </div>

        <!-- Tabla de emojis separada y debajo de la tabla de información -->
        <div class="game-panel room-emoji-chat">
            <h3>Reacciones rápidas</h3>
            <table class="emoji-table" id="emojiButtons" aria-label="Tabla de emojis">
                <tbody>
                    <tr>
                        <td>
                            <button type="button" class="emoji-button" data-emoji="sad" aria-label="Triste">
                                😢
                            </button>
                        </td>
                        <td>
                            <button type="button" class="emoji-button" data-emoji="angry" aria-label="Enojado">
                                😡
                            </button>
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <button type="button" class="emoji-button" data-emoji="poop" aria-label="Popó">
                                💩
                            </button>
                        </td>
                        <td>
                            <button type="button" class="emoji-button" data-emoji="love" aria-label="Amor">
                                😍
                            </button>
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <button type="button" class="emoji-button" data-emoji="wow" aria-label="Sorpresa">
                                😮
                            </button>
                        </td>
                        <td>
                            <button type="button" class="emoji-button" data-emoji="middle" aria-label="Dedo grosero">
                                🖕
                            </button>
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <button type="button" class="emoji-button" data-emoji="cry" aria-label="Llorando mucho">
                                😭
                            </button>
                        </td>
                        <td>
                            <button type="button" class="emoji-button" data-emoji="proud" aria-label="Orgulloso">
                                😎
                            </button>
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <button type="button" class="emoji-button" data-emoji="angel" aria-label="Ángel">
                                😇
                            </button>
                        </td>
                        <td>
                            <button type="button" class="emoji-button" data-emoji="demon" aria-label="Demonio">
                                😈
                            </button>
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <button type="button" class="emoji-button" data-emoji="sleep" aria-label="Dormido">
                                😴
                            </button>
                        </td>
                        <td></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Modal para el historial -->
    <div id="historyModal" class="history-modal" style="display: none">
        <h3>Historial de Cartas - <span id="historyColumnTitle"></span></h3>
        <div id="historyCardsContainer" class="history-cards"></div>
    </div>

    <div id="modalBackdrop" class="modal-backdrop" style="display: none"></div>

    <script type="module" src="game.js"></script>
    <script src="https://cdn.botpress.cloud/webchat/v3.3/inject.js"></script>
    <script src="https://files.bpcontent.cloud/2025/10/08/22/20251008223632-UHCQQDWQ.js" defer></script>
</body>

</html>
