<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Partida - The Game</title>
    <link rel="icon" type="image/png" href="/assets/cards-icon.png" />
    <link rel="stylesheet" href="styles.css" />
</head>

<body class="app-theme app-theme--game">
    <div id="loadingScreen" class="loading-screen loading-screen--themed">
        <div class="loading-content">
            <div class="loading-spinner"></div>
            <h2>Iniciando Partida</h2>
            <p>Por favor espera....</p>
        </div>
    </div>

    <div class="game-shell" id="gameShell">
        <div id="orientationTip" class="orientation-tip" aria-live="polite">
            Para una mejor experiencia, gira tu dispositivo a horizontal.
        </div>

        <section class="game-info-region">
            <div class="game-panel info-panel">
                <h3>Información del Juego</h3>
                <div class="panel-content">
                    <p>
                        <strong>Turno actual:</strong>
                        <span id="currentTurn">Esperando...</span>
                    </p>
                    <p>
                        <strong>Cartas restantes:</strong>
                        <span id="remainingDeck">98</span>
                    </p>
                    <div class="progress-container">
                        <span id="progressText">0/2 carta(s) jugada(s)</span>
                        <div class="progress-bar" id="progressBar"></div>
                    </div>
                </div>
            </div>
            <!-- Moved emoji panel here so it appears under the info panel on the left side -->
            <div id="emojiPanel" class="room-emoji-chat game-panel game-emoji-panel">
                <h3>Reacciones rápidas</h3>

                <div class="emoji-buttons" id="emojiButtons">
                    <button type="button" class="emoji-button" data-emoji="happy">😄</button>
                    <button type="button" class="emoji-button" data-emoji="love">😍</button>
                    <button type="button" class="emoji-button" data-emoji="wow">😮</button>
                    <button type="button" class="emoji-button" data-emoji="sleep">😴</button>
                    <button type="button" class="emoji-button" data-emoji="cry">😭</button>
                    <button type="button" class="emoji-button" data-emoji="proud">😎</button>
                    <button type="button" class="emoji-button" data-emoji="angel">😇</button>
                    <button type="button" class="emoji-button" data-emoji="crazy">🤪</button>
                    <button type="button" class="emoji-button" data-emoji="angry">😡</button>
                    <button type="button" class="emoji-button" data-emoji="demon">😈</button>
                    <button type="button" class="emoji-button" data-emoji="middle">🖕</button>
                    <button type="button" class="emoji-button" data-emoji="poop">💩</button>
                </div>
            </div>
        </section>

        <main class="game-main">
            <section class="game-board" id="gameBoard">
                <div id="gameContainer">
                    <canvas id="gameCanvas" width="800" height="700"></canvas>
                </div>
            </section>

            <section class="game-bottombar">
                <div class="game-controls">
                    <button id="endTurnBtn">Terminar Turno</button>
                </div>
                <div class="mobile-panel-actions">
                    <button id="togglePlayersDrawer" class="mobile-panel-btn" type="button" aria-controls="playersPanel"
                        aria-expanded="false">
                        Jugadores
                    </button>
                    <button id="toggleEmojiDrawer" class="mobile-panel-btn" type="button" aria-controls="emojiPanel"
                        aria-expanded="false">
                        Reacciones
                    </button>
                </div>
            </section>
        </main>

        <aside class="game-sidepanel">
            <div id="playersPanel" class="players-panel"></div>
        </aside>
    </div>
    <div id="gameDrawerBackdrop" class="game-drawer-backdrop"></div>

    <!-- Modal para el historial -->
    <div id="historyModal" class="history-modal" style="display: none">
        <h3>Historial de Cartas - <span id="historyColumnTitle"></span></h3>
        <div id="historyCardsContainer" class="history-cards"></div>
    </div>

    <div id="modalBackdrop" class="modal-backdrop" style="display: none"></div>

    <script src="appConfig.js"></script>
    <script src="/shared/gameRules.js"></script>
    <script src="/shared/avatars.js"></script>
    <script src="ui/soundManager.js"></script>
    <script type="module" src="game.js"></script>
</body>

</html>
