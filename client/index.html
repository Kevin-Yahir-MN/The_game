<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Game - Lobby</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="lobby-container">
        <div class="lobby-header">
            <h1>THE GAME</h1>
        </div>

        <div class="lobby-card">
            <div class="login-form">
                <div class="auth-card">
                    <div class="auth-header">
                        <h3>Cuenta</h3>
                        <p id="authStatus">No has iniciado sesión.</p>
                    </div>

                    <div class="auth-tabs">
                        <button id="showLoginTab" class="auth-tab active" type="button">Iniciar sesión</button>
                        <button id="showRegisterTab" class="auth-tab" type="button">Crear usuario</button>
                    </div>

                    <div id="loginPanel" class="auth-panel active">
                        <div class="form-group">
                            <label for="loginUsername">Usuario</label>
                            <input type="text" id="loginUsername" placeholder="Ej: jugador123">
                        </div>
                        <div class="form-group">
                            <label for="loginPassword">Contraseña</label>
                            <input type="password" id="loginPassword" placeholder="Tu contraseña">
                        </div>
                        <button id="loginBtn" class="btn btn-secondary" type="button">Iniciar sesión</button>
                    </div>

                    <div id="registerPanel" class="auth-panel">
                        <div class="form-group">
                            <label for="registerDisplayName">Nombre visible</label>
                            <input type="text" id="registerDisplayName" placeholder="Ej: Juan">
                        </div>
                        <div class="form-group">
                            <label for="registerUsername">Usuario</label>
                            <input type="text" id="registerUsername" placeholder="Ej: juan_01">
                        </div>
                        <div class="form-group">
                            <label for="registerPassword">Contraseña</label>
                            <input type="password" id="registerPassword" placeholder="Tu contraseña">
                        </div>
                        <button id="registerBtn" class="btn btn-primary" type="button">Crear usuario</button>
                    </div>

                    <button id="logoutBtn" class="btn btn-ghost" type="button" style="display: none;">Cerrar
                        sesión</button>
                </div>

                <div class="form-group">
                    <label for="playerName">Tu nombre</label>
                    <input type="text" id="playerName" placeholder="Ej: John" maxlength="20">
                </div>

                <div class="action-buttons">
                    <button id="createRoom" class="btn btn-primary">
                        <span class="btn-icon">+</span> Crear nueva sala
                    </button>

                    <div class="separator">
                        <span>o</span>
                    </div>

                    <div class="join-section">
                        <div class="form-group">
                            <label for="roomCode">Código de sala</label>
                            <input type="text" id="roomCode" placeholder="Ej: 1234" maxlength="4">
                        </div>
                        <button id="joinRoom" class="btn btn-secondary">
                            <span class="btn-icon">→</span> Unirse a sala
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="lobby.js"></script>

    <script src="https://cdn.botpress.cloud/webchat/v3.3/inject.js"></script>
    <script src="https://files.bpcontent.cloud/2025/10/08/22/20251008223632-UHCQQDWQ.js" defer></script>

</body>

</html>
