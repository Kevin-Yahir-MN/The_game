upstream the_game_app {
    server app:3000;
    keepalive 32;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    server_name cardenasexzacarias.tech www.cardenasexzacarias.tech;

    location /.well-known/acme-challenge/ {
        root /usr/share/nginx/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name cardenasexzacarias.tech www.cardenasexzacarias.tech;

    ssl_certificate /etc/letsencrypt/live/cardenasexzacarias.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cardenasexzacarias.tech/privkey.pem;

    client_max_body_size 10m;

    location / {
        proxy_pass http://the_game_app;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
